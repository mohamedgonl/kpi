<!DOCTYPE html>
<html lang="vi" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="KPI Tracking System — Employee performance tracking with 8 work groups, quality & progress assessment" />
  <title>KPI Tracker — Hệ thống theo dõi KPI</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📊%3C/text%3E%3C/svg%3E" />
</head>

<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen" style="display: none;">
      <div class="login-card">
        <h2 class="login-title">Đăng nhập</h2>
        <div class="form-group">
          <label>Người dùng</label>
          <select id="loginUserSelect"></select>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="loginPassword" placeholder="Mật khẩu mặc định: 123456" />
        </div>
        <button id="loginBtn" class="btn btn-primary login-btn">Đăng nhập</button>
        <p id="loginError" class="login-error"
          style="display:none; color:#ef4444; margin-top:10px; font-size:13px; text-align:center;">Mật khẩu không đúng
        </p>
      </div>
    </div>

    <!-- App Header -->
    <header class="app-header" id="app-header" style="display: none;">
      <div class="header-inner">
        <div class="app-logo">
          <div class="logo-icon">📊</div>
          <div class="logo-text">
            <span>KPI Tracker</span>
            <span class="logo-subtitle">VỤ PHÁP CHẾ - BỘ CÔNG THƯƠNG</span>
          </div>
        </div>

        <nav class="nav-tabs">
          <button class="nav-tab active" data-tab="dashboard">📋 Dashboard</button>
          <button class="nav-tab" data-tab="reports">📈 Báo cáo</button>
          <button class="nav-tab" data-tab="settings">⚙️ Cài đặt</button>
        </nav>

        <div class="header-actions">
          <div class="user-selector-wrap">
            <label>👤</label>
            <select class="user-select" id="currentUserSelect"></select>
          </div>
          <span class="cloud-indicator" id="cloudIndicator" style="display:none;"
            title="Đồng bộ đám mây đang hoạt động">☁️</span>
          <button class="btn btn-secondary" id="logoutBtn"
            style="padding: 6px 14px; font-size: 13px; margin-right: 8px;">Đăng xuất</button>
          <button class="theme-toggle" id="themeToggle" title="Chuyển đổi giao diện">🌙</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main" id="app-main" style="display: none;">
      <!-- Dashboard Page -->
      <div class="page active" id="page-dashboard"></div>

      <!-- Reports Page -->
      <div class="page" id="page-reports"></div>

      <!-- Settings Page -->
      <div class="page" id="page-settings"></div>
    </main>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <!-- Notification Container -->
    <div id="notification-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
